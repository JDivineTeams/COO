<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="ORYX" />
<meta name="theme-color" content="#131310" />
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%23131310'/%3E%3Ctext x='90' y='110' font-family='Helvetica,Arial,sans-serif' font-size='46' font-weight='700' fill='%23E0A52E' text-anchor='middle' letter-spacing='2'%3EORYX%3C/text%3E%3C/svg%3E" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%23131310'/%3E%3Ctext x='90' y='110' font-family='Helvetica,Arial,sans-serif' font-size='46' font-weight='700' fill='%23E0A52E' text-anchor='middle' letter-spacing='2'%3EORYX%3C/text%3E%3C/svg%3E" />
<title>ORYX — dein Cockpit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#131310; --surface:#1C1C17; --surface2:#24241D;
    --line:rgba(242,239,230,.10); --line2:rgba(242,239,230,.18);
    --text:#F2EFE6; --muted:#9D9C8E; --faint:#6E6D62;
    --gold:#E0A52E; --gold-soft:rgba(224,165,46,.13);
    --coral:#E2614A; --coral-soft:rgba(226,97,74,.13);
    --green:#6FCBA4; --green-soft:rgba(111,203,164,.13);
    --disp:'Space Grotesk',sans-serif; --body:'Inter',sans-serif;
    --nav-h:64px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{background:var(--bg); color:var(--text); font-family:var(--body); font-size:16px; line-height:1.5; -webkit-font-smoothing:antialiased; padding-bottom:calc(var(--nav-h) + env(safe-area-inset-bottom));}
  .wrap{max-width:560px; margin:0 auto; padding:0 16px}
  header{position:sticky; top:0; z-index:20; background:rgba(19,19,16,.86); backdrop-filter:blur(10px); border-bottom:.5px solid var(--line); padding-top:env(safe-area-inset-top);}
  .head-row{max-width:560px; margin:0 auto; padding:14px 16px; display:flex; align-items:baseline; justify-content:space-between}
  .brand{font-family:var(--disp); font-weight:700; letter-spacing:.22em; font-size:18px; color:var(--gold)}
  .brand small{display:block; font-family:var(--body); font-weight:400; letter-spacing:.02em; font-size:11px; color:var(--muted); margin-top:2px}
  .head-date{font-size:13px; color:var(--muted); text-align:right; font-variant-numeric:tabular-nums}
  .view{display:none; padding-top:18px}
  .view.active{display:block; animation:fade .25s ease}
  @keyframes fade{from{opacity:0; transform:translateY(4px)}to{opacity:1; transform:none}}
  .kpis{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px}
  .kpi{background:var(--surface); border:.5px solid var(--line); border-radius:14px; padding:13px 14px}
  .kpi .lab{font-size:12px; color:var(--muted); margin-bottom:6px}
  .kpi .val{font-family:var(--disp); font-weight:600; font-size:28px; line-height:1; font-variant-numeric:tabular-nums}
  .kpi .val span{font-size:15px; color:var(--faint); font-weight:500}
  .kpi .bar{height:5px; border-radius:99px; background:var(--surface2); margin-top:9px; overflow:hidden}
  .kpi .bar i{display:block; height:100%; border-radius:99px}
  .qlog{display:flex; gap:8px; margin-bottom:18px}
  .qlog button{flex:1; background:var(--surface); border:.5px solid var(--line2); border-radius:13px; padding:11px 6px; color:var(--text); font-family:var(--body); cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:3px; transition:.15s}
  .qlog button:active{transform:scale(.96)}
  .qlog button .ql-n{font-family:var(--disp); font-weight:600; font-size:20px; color:var(--gold); line-height:1}
  .qlog button .ql-l{font-size:11px; color:var(--muted); text-align:center; line-height:1.2}
  .command{background:var(--surface); border:.5px solid var(--coral); border-radius:18px; padding:18px; margin-bottom:18px; position:relative; overflow:hidden}
  .command::before{content:""; position:absolute; left:0; top:0; bottom:0; width:4px; background:var(--coral)}
  .command .ey{font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:var(--coral); font-weight:600; margin-bottom:9px}
  .command .mentor{font-size:14px; color:var(--muted); font-style:italic; margin-bottom:12px; line-height:1.45}
  .command .act{font-family:var(--disp); font-weight:600; font-size:21px; line-height:1.25; margin-bottom:16px}
  .command .btns{display:flex; gap:9px}
  .sec-title{font-family:var(--disp); font-weight:600; font-size:15px; letter-spacing:.01em; margin:22px 2px 11px}
  .sec-title .n{color:var(--faint); font-weight:500; font-size:14px}
  .move{display:flex; align-items:flex-start; gap:12px; background:var(--surface); border:.5px solid var(--line); border-radius:14px; padding:13px 14px; margin-bottom:9px; cursor:pointer; transition:.15s}
  .move:active{transform:scale(.99)}
  .move .tick{flex:0 0 22px; width:22px; height:22px; border-radius:7px; border:1.5px solid var(--line2); margin-top:1px; display:flex; align-items:center; justify-content:center; transition:.15s}
  .move .tick svg{opacity:0; width:13px; height:13px}
  .move .body .t{font-weight:500; font-size:15px; line-height:1.35}
  .move .body .s{font-size:13px; color:var(--muted); margin-top:2px}
  .move .dot{flex:0 0 8px; width:8px; height:8px; border-radius:99px; margin-top:7px}
  .move.done{opacity:.5}
  .move.done .tick{background:var(--green); border-color:var(--green)}
  .move.done .tick svg{opacity:1}
  .move.done .body .t{text-decoration:line-through; text-decoration-color:var(--faint)}
  .pill{display:inline-flex; align-items:center; gap:6px; font-size:12px; padding:3px 9px; border-radius:99px; font-weight:500}
  button.btn{font-family:var(--body); font-weight:600; font-size:14px; border-radius:11px; padding:11px 15px; border:.5px solid var(--line2); background:transparent; color:var(--text); cursor:pointer; transition:.15s; display:inline-flex; align-items:center; gap:7px; justify-content:center}
  button.btn:active{transform:scale(.97)}
  button.btn.gold{background:var(--gold); border-color:var(--gold); color:#1a1407}
  button.btn.coral{background:var(--coral); border-color:var(--coral); color:#2a0f08}
  button.btn.ghost{background:var(--surface2)}
  button.btn.full{width:100%}
  button.btn svg{width:16px; height:16px}
  .empty{text-align:center; color:var(--muted); padding:34px 18px; border:.5px dashed var(--line2); border-radius:16px; font-size:14px; line-height:1.55}
  .empty b{color:var(--text); font-weight:600; display:block; margin-bottom:6px; font-family:var(--disp)}
  .card{background:var(--surface); border:.5px solid var(--line); border-radius:14px; padding:14px; margin-bottom:10px}
  .card .top{display:flex; align-items:center; justify-content:space-between; gap:10px}
  .card .nm{font-weight:600; font-size:16px; font-family:var(--disp)}
  .card .meta{font-size:13px; color:var(--muted); margin-top:3px}
  .card .ns{font-size:13px; color:var(--text); margin-top:9px; background:var(--surface2); padding:8px 10px; border-radius:9px}
  .stagebar{display:flex; gap:4px; margin-top:11px}
  .stagebar i{flex:1; height:5px; border-radius:99px; background:var(--surface2)}
  .stagebar i.on{background:var(--green)}
  .card .actions{display:flex; gap:8px; margin-top:11px}
  .card .actions button{flex:1; font-size:13px; padding:9px}
  .addbar{display:flex; gap:8px; margin:6px 0 16px}
  .addbar input{flex:1; background:var(--surface); border:.5px solid var(--line2); color:var(--text); border-radius:11px; padding:11px 13px; font-family:var(--body); font-size:15px}
  .addbar input:focus{outline:none; border-color:var(--gold)}
  .seg{display:flex; gap:6px; margin-bottom:14px; overflow-x:auto; -webkit-overflow-scrolling:touch; padding-bottom:2px}
  .seg button{white-space:nowrap; font-size:13px; padding:8px 13px; border-radius:99px; border:.5px solid var(--line); background:var(--surface); color:var(--muted); font-weight:500; cursor:pointer}
  .seg button.on{background:var(--gold-soft); border-color:var(--gold); color:var(--gold)}
  #chat{display:flex; flex-direction:column; gap:11px; margin-bottom:14px; min-height:36vh}
  .msg{max-width:88%; padding:11px 14px; border-radius:16px; font-size:15px; line-height:1.5; white-space:pre-wrap}
  .msg.me{align-self:flex-end; background:var(--gold-soft); border:.5px solid var(--gold); border-bottom-right-radius:5px}
  .msg.coo{align-self:flex-start; background:var(--surface); border:.5px solid var(--line); border-bottom-left-radius:5px}
  .typing{align-self:flex-start; color:var(--muted); font-size:14px; font-style:italic}
  .composer{position:sticky; bottom:calc(var(--nav-h) + env(safe-area-inset-bottom) + 8px); display:flex; gap:8px; align-items:flex-end}
  .composer textarea{flex:1; resize:none; background:var(--surface); border:.5px solid var(--line2); color:var(--text); border-radius:14px; padding:11px 13px; font-family:var(--body); font-size:15px; max-height:120px; line-height:1.4}
  .composer textarea:focus{outline:none; border-color:var(--gold)}
  .iconbtn{flex:0 0 44px; width:44px; height:44px; border-radius:13px; border:.5px solid var(--line2); background:var(--surface2); color:var(--text); display:flex; align-items:center; justify-content:center; cursor:pointer}
  .iconbtn.gold{background:var(--gold); border-color:var(--gold); color:#1a1407}
  .iconbtn.rec{background:var(--coral); border-color:var(--coral); color:#2a0f08; animation:pulse 1s infinite}
  @keyframes pulse{50%{opacity:.55}}
  .iconbtn svg{width:20px; height:20px}
  .spk{font-size:12px; color:var(--muted); display:inline-flex; align-items:center; gap:5px; cursor:pointer; background:none; border:none; padding:4px 0; margin-top:6px}
  .spk svg{width:14px; height:14px}
  nav{position:fixed; left:0; right:0; bottom:0; z-index:30; background:rgba(19,19,16,.94); backdrop-filter:blur(12px); border-top:.5px solid var(--line); height:calc(var(--nav-h) + env(safe-area-inset-bottom)); padding-bottom:env(safe-area-inset-bottom); display:flex}
  nav button{flex:1; background:none; border:none; color:var(--faint); font-family:var(--body); font-size:10.5px; font-weight:500; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; cursor:pointer; padding:0}
  nav button svg{width:22px; height:22px; stroke-width:1.7}
  nav button.on{color:var(--gold)}
  .toast{position:fixed; left:50%; transform:translateX(-50%); bottom:calc(var(--nav-h) + 22px); background:var(--surface2); border:.5px solid var(--line2); color:var(--text); padding:11px 18px; border-radius:99px; font-size:14px; z-index:50; opacity:0; transition:.25s; pointer-events:none; max-width:90vw; text-align:center}
  .toast.show{opacity:1}
  .review{background:var(--surface); border:.5px solid var(--gold); border-radius:18px; padding:18px; margin-bottom:18px}
  .review .counter{display:flex; align-items:center; justify-content:space-between; background:var(--surface2); border-radius:12px; padding:10px 14px; margin:9px 0}
  .review .counter .cv{font-family:var(--disp); font-weight:600; font-size:22px; min-width:34px; text-align:center}
  .review .counter .pm{display:flex; gap:8px}
  .review .counter .pm button{width:38px; height:38px; border-radius:10px; border:.5px solid var(--line2); background:var(--bg); color:var(--text); font-size:20px; cursor:pointer}
  .setrow{display:flex; align-items:center; justify-content:space-between; background:var(--surface); border:.5px solid var(--line); border-radius:12px; padding:10px 13px; margin-bottom:14px; font-size:13px; color:var(--muted)}
  .setrow b{color:var(--text); font-weight:500}
  .setrow button{background:none; border:none; color:var(--gold); font-size:13px; font-weight:600; cursor:pointer; font-family:var(--body)}
  .stat{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px}
  .stat .s{background:var(--surface); border:.5px solid var(--line); border-radius:14px; padding:13px 14px}
  .stat .s .l{font-size:12px; color:var(--muted); margin-bottom:5px}
  .stat .s .v{font-family:var(--disp); font-weight:600; font-size:26px; line-height:1; font-variant-numeric:tabular-nums}
  .stat .s .v small{font-size:13px; color:var(--faint); font-weight:500}
  .funnel{background:var(--surface); border:.5px solid var(--line); border-radius:16px; padding:16px; margin-bottom:14px}
  .funnel h4{font-family:var(--disp); font-size:14px; font-weight:600; margin:0 0 10px}
  .funnel .row{display:flex; align-items:center; padding:6px 0}
  .funnel .row .fl{font-size:13px; color:var(--text); flex:0 0 116px}
  .funnel .row .fb{flex:1; height:8px; margin:0 10px; background:var(--surface2); border-radius:99px; overflow:hidden}
  .funnel .row .fb i{display:block; height:100%; border-radius:99px}
  .funnel .row .fv{font-family:var(--disp); font-weight:600; min-width:30px; text-align:right; font-variant-numeric:tabular-nums}
  .bars-wrap{background:var(--surface); border:.5px solid var(--line); border-radius:16px; padding:16px; margin-bottom:14px}
  .bars-wrap h4{font-family:var(--disp); font-size:14px; font-weight:600; margin:0 0 12px}
  .bars{display:flex; align-items:flex-end; gap:5px; height:96px}
  .bars .b{flex:1; background:var(--surface2); border-radius:5px 5px 0 0; position:relative; min-height:3px}
  .bars .b i{position:absolute; left:0; right:0; bottom:0; background:var(--gold); border-radius:5px 5px 0 0; min-height:3px}
  .bars-x{display:flex; gap:5px; margin-top:6px}
  .bars-x span{flex:1; text-align:center; font-size:10px; color:var(--faint)}
  .insight{background:var(--gold-soft); border:.5px solid var(--gold); border-radius:14px; padding:13px 15px; font-size:14px; line-height:1.5; color:var(--text); margin-bottom:14px}
</style>
</head>
<body>
<header>
  <div class="head-row">
    <div class="brand">ORYX<small>Aktivitäten schlagen Ergebnisse</small></div>
    <div class="head-date" id="headDate"></div>
  </div>
</header>

<main class="wrap">
  <section class="view active" id="v-heute"></section>
  <section class="view" id="v-pipeline"></section>
  <section class="view" id="v-netzwerk"></section>
  <section class="view" id="v-rueckblick"></section>
  <section class="view" id="v-mentor">
    <div class="sec-title">Mentor <span class="n">— dein zweiter Kopf</span></div>
    <div class="setrow" id="setrow"></div>
    <div id="chat"></div>
    <div class="composer">
      <textarea id="mInput" rows="1" placeholder="Schreib oder sprich, was dich beschäftigt…"></textarea>
      <button class="iconbtn" id="mMic" title="Sprechen" style="display:none"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="9" y="3" width="6" height="11" rx="3"/><path d="M5 11a7 7 0 0 0 14 0M12 18v3"/></svg></button>
      <button class="iconbtn gold" id="mSend" title="Senden"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M5 12h14M13 6l6 6-6 6"/></svg></button>
    </div>
  </section>
</main>

<nav>
  <button data-v="heute" class="on"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="4"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M5 5l2 2M17 17l2 2M19 5l-2 2M7 17l-2 2"/></svg>Heute</button>
  <button data-v="pipeline"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 4h18l-7 8v6l-4 2v-8z"/></svg>Pipeline</button>
  <button data-v="netzwerk"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="9" cy="8" r="3"/><path d="M3 20c0-3 3-5 6-5s6 2 6 5"/><circle cx="17" cy="7" r="2.3"/><path d="M16 14c3 0 5 2 5 5"/></svg>Netzwerk</button>
  <button data-v="rueckblick"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 3v18h18"/><path d="M7 14l4-4 3 3 5-6"/></svg>Rückblick</button>
  <button data-v="mentor"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 5h16v11H9l-5 4z"/></svg>Mentor</button>
</nav>
<div class="toast" id="toast"></div>

<script>
/* storage: window.storage (in Claude) OR localStorage (installed app). Persists either way.
   Hinweis: interner Speicher-Prefix bleibt "coo:" — so bleiben deine bestehenden Daten erhalten. */
const mem={};
const inClaude = !!window.storage;
const store={
  async get(k){ try{ if(inClaude){ const r=await window.storage.get(k,false); return r?JSON.parse(r.value):null; } const v=localStorage.getItem(k); return v?JSON.parse(v):null; }catch(e){ return (k in mem)?mem[k]:null; } },
  async set(k,v){ mem[k]=v; try{ if(inClaude){ await window.storage.set(k,JSON.stringify(v),false); } else { localStorage.setItem(k,JSON.stringify(v)); } }catch(e){} }
};

let S={ kandidaten:[], kunden:[], kontakte:[], events:[], week:null, doneByDate:{}, log:{}, settings:{partnerMin:3,partnerStretch:10,newTarget:4,outTarget:4,tracking:true}, chat:[], apikey:'' };
const STAGES=["Kennengelernt","CO-Gespräch","Geputscht","Ansprache","Abschluss"];
const STAGE_HINT={
  "Kennengelernt":"Kontaktdaten da. Nächstes: zeig beiläufig, was du machst.",
  "CO-Gespräch":"Er weiß, was du machst. Jetzt heiß machen — Ernstgespräch terminieren.",
  "Geputscht":"Heiß gemacht. Jetzt die Ergebnis-Ansprache: „den Weg gemeinsam gehen“.",
  "Ansprache":"Ansprache steht. Zum Abschluss bringen — Partner oder Mandant.",
  "Abschluss":"Im Abschluss. Partner oder Mandant markieren."
};
const NEXT_BY_STAGE={
  "Kennengelernt":"CO-Gespräch anbahnen — zeig beiläufig, was du machst",
  "CO-Gespräch":"Heiß machen — Ernstgespräch terminieren",
  "Geputscht":"Ergebnis-Ansprache setzen: „den Weg gemeinsam gehen“",
  "Ansprache":"Zum Abschluss bringen — Partner oder Mandant"
};
const MENTOR_LINES=[
  "Du kontrollierst nicht, wer zusagt. Du kontrollierst, wie viele du heute ansprichst. Mach das eine richtig.",
  "Die 1,25 Millionen baust du nicht allein — du baust sie durch Menschen. Jeder Partner ist ein Hebel, kein Termin.",
  "Ein Abschluss zahlt einmal. Ein Partner zahlt jeden Monat. Investier dort, wo es sich wiederholt.",
  "Heute zählt nicht, wie du dich fühlst. Heute zählt, wen du erreichst. Anfangen schlägt abwarten.",
  "Dein Engpass ist nicht das Überzeugen — du hast Marc gewonnen. Dein Engpass ist die Menge oben. Mach den Trichter breiter.",
  "Frag heute einen Kunden, wen er kennt, der mehr aus sich machen will. Eine Frage, eine Tür.",
  "Lautstärke schlägt Glück. Genug Versuche, und der Zufall hat keine Chance mehr gegen dich.",
  "Bau Systeme, keine Stimmungen. Ein guter Tag ist einer, der sich morgen wiederholen lässt.",
  "Müdigkeit ist kein Argument. Erschöpfung schon — wenn du leer bist, ruh dich aus und komm scharf zurück. Beides ist Disziplin.",
  "Ein Operator mit 100 Millionen jagt keine Absagen hinterher. Er füllt die Pipeline so voll, dass eine Absage Rauschen ist."
];

const $=s=>document.querySelector(s);
const todayKey=()=>new Date().toISOString().slice(0,10);
function fmtDate(d){return d.toLocaleDateString('de-DE',{weekday:'short',day:'2-digit',month:'short'});}
function daysSince(iso){if(!iso)return 999;return Math.floor((Date.now()-new Date(iso).getTime())/86400000);}
function monday(d){const x=new Date(d);const day=(x.getDay()+6)%7;x.setDate(x.getDate()-day);x.setHours(0,0,0,0);return x.toISOString().slice(0,10);}
function uid(){return Math.random().toString(36).slice(2,9);}
let toastT; function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),1900);}
function activePartners(){return S.kandidaten.filter(k=>k.result==='Partner').length;}
function doneSet(){return new Set(S.doneByDate[todayKey()]||[]);}
async function markDone(id,on){const k=todayKey();const set=new Set(S.doneByDate[k]||[]);on?set.add(id):set.delete(id);S.doneByDate[k]=[...set];await store.set('coo:doneByDate',S.doneByDate);}
async function save(key){await store.set('coo:'+key,S[key]);}

/* ---- Tracking / Speicher ---- */
function logEnsure(date){ if(!S.log[date])S.log[date]={o:0,n:0,t:0,d:0,p:0,m:0}; return S.log[date]; }
function tl(){return S.log[todayKey()]||{};}
async function logBump(field,delta){ if(!S.settings.tracking)return; const e=logEnsure(todayKey()); e[field]=Math.max(0,(e[field]||0)+delta); await save('log'); }
async function logOpen(){ if(!S.settings.tracking)return; const e=logEnsure(todayKey()); e.o=1; await save('log'); }
async function adjustActivity(kind,d){
  const wf={new:'newPeople',talk:'talks',out:'out'}[kind];
  const lf={new:'n',talk:'t',out:'d'}[kind];
  await bumpWeek(wf,d,true); await logBump(lf,d);
}

function buildMoves(){
  const moves=[]; const newLeft=Math.max(0,S.settings.newTarget-(S.week?S.week.newPeople:0));
  if(newLeft>0){
    moves.push({id:'mouth-meet',prio:1,color:'var(--coral)',t:'Triff heute 1 neuen passenden Menschen',s:'Die Trichterspitze. Noch '+newLeft+' diese Woche.',counter:'new'});
  }
  // Befehl-Pool: rotiert täglich zwischen Empfehlungs-Varianten
  const REFS=[
    {id:'ref-partner',t:'Frag 1 Kunden nach einer Partner-Empfehlung',s:'„Wen kennst du, der mehr aus sich machen will?“'},
    {id:'ref-allg',t:'Frag um eine Empfehlung für ein neues Gespräch',s:'Empfehlungen sind dein schnellster Kanal.'},
    {id:'ref-event',t:'Frag: „Gibt’s ein Event, zu dem du mich mitnimmst?“',s:'Ein Event = mehrere neue Menschen auf einmal.'}
  ];
  const ref=REFS[(new Date().getDate())%REFS.length];
  moves.push({id:ref.id,prio:1,color:'var(--coral)',t:ref.t,s:ref.s});

  S.events.forEach(e=>{ const du=daysSince(e.date)*-1; if(!e.invited&&du>=0&&du<=(e.lead||14)){ moves.push({id:'ev-'+e.id,prio:2,color:'var(--gold)',t:'Jetzt einladen: '+e.title,s:'in '+du+' Tagen — lade die Leute jetzt an',kind:'event',ref:e.id}); } });
  S.kandidaten.filter(k=>k.stage!=="Abschluss").forEach(k=>{
    if(k.next){ moves.push({id:'ka-'+k.id,prio:2,color:'var(--green)',t:k.next,s:'Kandidat: '+k.name+' · '+k.stage,kind:'kand',ref:k.id,counter:'talk'}); }
    else if(daysSince(k.touch)>=5){ const hint=NEXT_BY_STAGE[k.stage]||('Nächsten Schritt mit '+k.name+' setzen'); moves.push({id:'ka-'+k.id,prio:3,color:'var(--green)',t:hint+' ('+k.name+')',s:k.stage+' · '+daysSince(k.touch)+' Tage kein Kontakt',kind:'kand',ref:k.id}); }
  });
  S.kunden.filter(c=>c.next).forEach(c=>{ moves.push({id:'ku-'+c.id,prio:3,color:'var(--gold)',t:c.next,s:'Mandant: '+c.name,kind:'kunde',ref:c.id}); });
  S.kontakte.forEach(c=>{ const ds=daysSince(c.touch); if(ds>=(c.cad||30)){ moves.push({id:'ko-'+c.id,prio:4,color:'var(--muted)',t:'Melde dich bei '+c.name,s:ds>900?'noch kein Kontakt vermerkt':ds+' Tage her — warmhalten',kind:'kontakt',ref:c.id}); } });
  moves.sort((a,b)=>a.prio-b.prio); return moves;
}

function renderHeute(){
  const v=$('#v-heute'); const ap=activePartners(),pmin=S.settings.partnerMin;
  const nw=S.week?S.week.newPeople:0,nt=S.settings.newTarget;
  const ow=S.week?(S.week.out||0):0;
  const moves=buildMoves(),done=doneSet(); const undone=moves.filter(m=>!done.has(m.id)); const command=undone[0];
  const li=(new Date().getDate())%MENTOR_LINES.length; const T=tl(); let html='';
  html+=`<div class="kpis">
    <div class="kpi"><div class="lab">Aktive Partner</div><div class="val">${ap}<span>/${pmin} min · ${S.settings.partnerStretch} Ziel</span></div><div class="bar"><i style="width:${Math.min(100,ap/pmin*100)}%;background:var(--green)"></i></div></div>
    <div class="kpi"><div class="lab">Neue Menschen / Woche</div><div class="val">${nw}<span>/${nt}</span></div><div class="bar"><i style="width:${Math.min(100,nt?nw/nt*100:0)}%;background:${nw>=nt?'var(--green)':'var(--coral)'}"></i></div></div>
  </div>`;
  // Quick-Log: warst du heute draußen / Gespräch geführt / neuen Menschen getroffen?
  html+=`<div class="qlog">
    <button onclick="qlog('out')"><span class="ql-n">${T.d||0}</span><span class="ql-l">Heute draußen</span></button>
    <button onclick="qlog('talk')"><span class="ql-n">${T.t||0}</span><span class="ql-l">Ernstes Gespräch</span></button>
    <button onclick="qlog('new')"><span class="ql-n">${T.n||0}</span><span class="ql-l">Neuer Mensch</span></button>
  </div>`;
  if(command){
    html+=`<div class="command"><div class="ey">Befehl des Tages</div><div class="mentor">${MENTOR_LINES[li]}</div><div class="act">${command.t}</div>
      <div class="btns"><button class="btn coral" onclick="doMove('${command.id}')">Erledigt</button>
      <button class="btn ghost" onclick="speakBriefing()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M5 9v6h4l5 4V5L9 9zM17 8a5 5 0 0 1 0 8"/></svg>Vorlesen</button></div></div>`;
  } else {
    html+=`<div class="command"><div class="ey" style="color:var(--green)">Alles abgearbeitet</div><div class="act" style="font-size:18px">Stark. Heute hast du deine Züge gemacht.</div><div class="mentor">${MENTOR_LINES[li]}</div></div>`;
  }
  [[1,'Trichterspitze — hier entscheidet sich SC'],[2,'Kandidaten & Termine'],[3,'Mandanten & Eigengeschäft'],[4,'Warmhalten']].forEach(([p,label])=>{
    const inG=moves.filter(m=>m.prio===p); if(!inG.length)return;
    html+=`<div class="sec-title">${label}</div>`;
    inG.forEach(m=>{ const isDone=done.has(m.id);
      html+=`<div class="move ${isDone?'done':''}" onclick="doMove('${m.id}')"><div class="dot" style="background:${m.color}"></div>
        <div class="tick"><svg viewBox="0 0 24 24" fill="none" stroke="#15240f" stroke-width="3"><path d="M4 12l5 5L20 6"/></svg></div>
        <div class="body"><div class="t">${m.t}</div><div class="s">${m.s}</div></div></div>`; });
  });
  html+=`<div class="review" style="margin-top:24px"><div class="ey" style="font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:6px">Tagesabschluss</div>
    <div style="font-size:14px;color:var(--muted);margin-bottom:6px">Trag ein, was du diese Woche wirklich bewegt hast. Das treibt deine Zahlen.</div>
    <div class="counter"><span>Neue Menschen getroffen</span><div class="pm"><button onclick="bump('new',-1)">–</button><span class="cv">${nw}</span><button onclick="bump('new',1)">+</button></div></div>
    <div class="counter"><span>Ernsthafte Gespräche</span><div class="pm"><button onclick="bump('talk',-1)">–</button><span class="cv">${S.week?S.week.talks:0}</span><button onclick="bump('talk',1)">+</button></div></div>
    <div class="counter"><span>Draußen aktiv gewesen</span><div class="pm"><button onclick="bump('out',-1)">–</button><span class="cv">${ow}</span><button onclick="bump('out',1)">+</button></div></div>
    <div style="font-size:13px;color:var(--faint);margin-top:10px;text-align:center">${done.size} Züge heute erledigt · ${ow}× diese Woche draußen</div></div>`;
  v.innerHTML=html;
}
window.qlog=async function(kind){await adjustActivity(kind,1);await logOpen();renderHeute();toast('Notiert');};
window.doMove=async function(id){
  const set=doneSet(); const on=!set.has(id); await markDone(id,on);
  const m=buildMoves().find(x=>x.id===id);
  if(on&&m){ if(m.counter==='new')await adjustActivity('new',1); if(m.counter==='talk')await adjustActivity('talk',1);
    if(m.kind==='kand'||m.kind==='kunde'||m.kind==='kontakt')await touchRef(m.kind,m.ref);
    if(m.kind==='event'){const e=S.events.find(x=>x.id===m.ref);if(e){e.invited=true;await save('events');}} toast('Erledigt — weiter so'); }
  renderHeute();
};
async function touchRef(kind,id){const map={kand:'kandidaten',kunde:'kunden',kontakt:'kontakte'};const o=S[map[kind]].find(x=>x.id===id);if(o){o.touch=new Date().toISOString();await save(map[kind]);}}
async function bumpWeek(f,d,silent){if(!S.week)S.week={start:monday(new Date()),newPeople:0,talks:0,out:0};S.week[f]=Math.max(0,(S.week[f]||0)+d);await save('week');if(!silent)renderHeute();}
window.bump=async function(kind,d){await adjustActivity(kind,d);renderHeute();};

let pipeFilter='alle';
function renderPipeline(){
  const v=$('#v-pipeline'); const counts={}; STAGES.forEach(s=>counts[s]=S.kandidaten.filter(k=>k.stage===s).length);
  const cP=S.kandidaten.filter(k=>k.result==='Partner').length, cM=S.kandidaten.filter(k=>k.result==='Mandant').length;
  let html=`<div class="sec-title">Pipeline <span class="n">— dein Engpass sitzt ganz oben</span></div>`;
  html+=`<div class="addbar"><input id="kaName" placeholder="Neuer Name: Partner- oder Mandanten-Spur…" onkeydown="if(event.key==='Enter')addKandidat()"><button class="btn gold" onclick="addKandidat()">+</button></div><div class="seg">`;
  html+=`<button class="${pipeFilter==='alle'?'on':''}" onclick="setPipe('alle')">Alle ${S.kandidaten.length}</button>`;
  STAGES.forEach(s=>{html+=`<button class="${pipeFilter===s?'on':''}" onclick="setPipe('${s}')">${s} ${counts[s]}</button>`;});
  html+=`<button class="${pipeFilter==='r:Partner'?'on':''}" onclick="setPipe('r:Partner')">Partner ${cP}</button>`;
  html+=`<button class="${pipeFilter==='r:Mandant'?'on':''}" onclick="setPipe('r:Mandant')">Mandant ${cM}</button></div>`;
  const list=S.kandidaten.filter(k=> pipeFilter==='alle' ? true : (pipeFilter.startsWith('r:') ? k.result===pipeFilter.slice(2) : k.stage===pipeFilter));
  if(!list.length)html+=`<div class="empty"><b>Noch leer hier.</b>Jeder Partner und jeder Mandant beginnt als ein Name. Trag den ersten ein — und mach den Trichter oben breit, das ist die eine Zahl, die über SC entscheidet.</div>`;
  list.forEach(k=>{ const si=STAGES.indexOf(k.stage);
    const pillTxt=k.result||k.stage;
    const pillCol=k.result==='Partner'?'var(--green)':(k.result==='Mandant'?'var(--gold)':'var(--gold)');
    const pillBg=k.result==='Partner'?'var(--green-soft)':'var(--gold-soft)';
    let acts;
    if(k.stage==='Abschluss'&&!k.result){
      acts=`<div class="actions"><button class="btn ghost" onclick="moveStage('${k.id}',-1)">◀</button><button class="btn gold" onclick="setResult('${k.id}','Partner')">Als Partner</button><button class="btn ghost" onclick="setResult('${k.id}','Mandant')">Als Mandant</button></div>`;
    } else {
      acts=`<div class="actions"><button class="btn ghost" onclick="moveStage('${k.id}',-1)">◀</button><button class="btn ghost" onclick="editNext('${k.id}')">Schritt</button><button class="btn gold" onclick="moveStage('${k.id}',1)">▶</button></div>`;
    }
    const noteLine = k.next ? `<div class="ns">▸ ${k.next}</div>` : (k.stage!=='Abschluss' && STAGE_HINT[k.stage] ? `<div class="ns" style="opacity:.72">Vorschlag: ${NEXT_BY_STAGE[k.stage]||''}</div>` : '');
    html+=`<div class="card"><div class="top"><div><div class="nm">${k.name}</div><div class="meta">${k.channel||'—'} · ${daysSince(k.touch)>900?'kein Kontakt':daysSince(k.touch)+' T. her'}</div></div>
      <span class="pill" style="background:${pillBg};color:${pillCol}">${pillTxt}</span></div>
      <div class="stagebar">${STAGES.map((s,i)=>`<i class="${i<=si?'on':''}"></i>`).join('')}</div>
      ${noteLine}
      ${acts}</div>`; });
  v.innerHTML=html;
}
window.setPipe=s=>{pipeFilter=s;renderPipeline();};
window.addKandidat=async function(){const i=$('#kaName');const n=i.value.trim();if(!n)return;S.kandidaten.unshift({id:uid(),name:n,stage:'Kennengelernt',result:'',channel:'',next:'',touch:new Date().toISOString()});await save('kandidaten');i.value='';renderPipeline();toast('Eingetragen — Trichter wird breiter');};
window.moveStage=async function(id,dir){const k=S.kandidaten.find(x=>x.id===id);if(!k)return;let i=Math.max(0,Math.min(STAGES.length-1,STAGES.indexOf(k.stage)+dir));k.stage=STAGES[i];if(k.stage!=='Abschluss')k.result='';k.touch=new Date().toISOString();await save('kandidaten');renderPipeline();renderHeute();};
window.setResult=async function(id,r){const k=S.kandidaten.find(x=>x.id===id);if(!k)return;const was=k.result;k.result=r;k.stage='Abschluss';k.touch=new Date().toISOString();await save('kandidaten');if(was!==r){ if(r==='Partner')await logBump('p',1); else await logBump('m',1);} renderPipeline();renderHeute();toast(r==='Partner'?'🟢 '+k.name+' ist Partner — zahlt auf beide Tore.':'✓ '+k.name+' ist Mandant.');};
window.editNext=async function(id){const k=S.kandidaten.find(x=>x.id===id);if(!k)return;const n=prompt('Nächster konkreter Schritt mit '+k.name+':',k.next||NEXT_BY_STAGE[k.stage]||'');if(n===null)return;k.next=n.trim();await save('kandidaten');renderPipeline();};

  if(netTab==='kontakte'){
    html+=`<div class="addbar"><input id="koName" placeholder="Person: Name…" onkeydown="if(event.key==='Enter')addKontakt()"><button class="btn gold" onclick="addKontakt()">+</button></div>`;
    html+=`<div style="font-size:13px;color:var(--muted);margin:-8px 2px 14px">Alle Menschen, die noch keine Mandanten sind: hier reinlegen und warmhalten, bis der richtige Moment kommt.</div>`;

  }

/* ---- Rückblick / Speicher ---- */
let rkPeriod=30;
function aggregate(days){
  const today=new Date(); let s={o:0,n:0,t:0,d:0,p:0,m:0,moves:0,active:0,total:days};
  for(let i=0;i<days;i++){ const dt=new Date(today);dt.setDate(dt.getDate()-i);const key=dt.toISOString().slice(0,10);
    const e=S.log[key]; if(e){ s.n+=e.n||0;s.t+=e.t||0;s.d+=e.d||0;s.p+=e.p||0;s.m+=e.m||0; if(e.o)s.active++; }
    s.moves+=(S.doneByDate[key]||[]).length;
  } return s;
}
function streak(){ let n=0; const t=new Date(); for(let i=0;i<420;i++){ const dt=new Date(t);dt.setDate(dt.getDate()-i);const e=S.log[dt.toISOString().slice(0,10)]; if(e&&e.o)n++; else break; } return n; }
function buckets(days,size){ const out=[]; const today=new Date(); const nb=Math.ceil(days/size);
  for(let b=nb-1;b>=0;b--){ let sum=0; for(let i=0;i<size;i++){ const off=b*size+i; if(off>=days)continue; const dt=new Date(today);dt.setDate(dt.getDate()-off);const e=S.log[dt.toISOString().slice(0,10)]; if(e)sum+=e.n||0; } out.push(sum); } return out;
}
function renderRueckblick(){
  const v=$('#v-rueckblick'); const tracking=S.settings.tracking;
  let html=`<div class="sec-title">Rückblick <span class="n">— was wirkt, was nicht</span></div>`;
  html+=`<div class="setrow"><span>Tracking ${tracking?'<b>aktiv</b> — Oryx merkt sich deine Tage':'<b>aus</b> — nichts wird gespeichert'}</span><button onclick="toggleTracking()">${tracking?'ausschalten':'einschalten'}</button></div>`;
  if(!tracking){
    html+=`<div class="empty"><b>Tracking ist aus.</b>Schalt es oben ein, dann registriert Oryx ab heute, wie viele Menschen du triffst, wie viele Gespräche du führst, was du abarbeitest — und du siehst rückblickend, was funktioniert.</div>`;
    v.innerHTML=html; return;
  }
  html+=`<div class="seg"><button class="${rkPeriod===30?'on':''}" onclick="setRk(30)">Monat</button><button class="${rkPeriod===90?'on':''}" onclick="setRk(90)">Quartal</button><button class="${rkPeriod===365?'on':''}" onclick="setRk(365)">Jahr</button></div>`;
  const a=aggregate(rkPeriod); const st=streak(); const cons=a.total?Math.round(a.active/a.total*100):0;
  html+=`<div class="stat">
    <div class="s"><div class="l">Aktiv an Tagen</div><div class="v">${a.active}<small>/${a.total} · ${cons}%</small></div></div>
    <div class="s"><div class="l">Streak (in Folge)</div><div class="v">${st}<small> Tage</small></div></div>
    <div class="s"><div class="l">Neue Menschen</div><div class="v">${a.n}</div></div>
    <div class="s"><div class="l">Ernste Gespräche</div><div class="v">${a.t}</div></div>
    <div class="s"><div class="l">Draußen aktiv</div><div class="v">${a.d}<small>×</small></div></div>
    <div class="s"><div class="l">Züge erledigt</div><div class="v">${a.moves}</div></div>
    <div class="s"><div class="l">Neue Partner</div><div class="v" style="color:var(--green)">${a.p}</div></div>
    <div class="s"><div class="l">Neue Mandanten</div><div class="v" style="color:var(--gold)">${a.m}</div></div>
  </div>`;
  // Funnel
  const mx=Math.max(a.n,a.t,a.p+a.m,1);
  html+=`<div class="funnel"><h4>Dein Trichter in diesem Zeitraum</h4>
    <div class="row"><span class="fl">Neue Menschen</span><div class="fb"><i style="width:${a.n/mx*100}%;background:var(--coral)"></i></div><span class="fv">${a.n}</span></div>
    <div class="row"><span class="fl">Ernste Gespräche</span><div class="fb"><i style="width:${a.t/mx*100}%;background:var(--gold)"></i></div><span class="fv">${a.t}</span></div>
    <div class="row"><span class="fl">Abschlüsse</span><div class="fb"><i style="width:${(a.p+a.m)/mx*100}%;background:var(--green)"></i></div><span class="fv">${a.p+a.m}</span></div>
  </div>`;
  // Bars: neue Menschen je Bucket
  const size=rkPeriod===365?30:7; const bars=buckets(rkPeriod,size); const bmax=Math.max(...bars,1);
  const xl=rkPeriod===365?'je Monat':'je Woche';
  html+=`<div class="bars-wrap"><h4>Neue Menschen — ${xl}</h4><div class="bars">${bars.map(b=>`<div class="b"><i style="height:${b/bmax*100}%"></i></div>`).join('')}</div><div class="bars-x"><span>früher</span><span style="text-align:right">heute</span></div></div>`;
  // Insight
  let ins=`Du warst an ${a.active} von ${a.total} Tagen dran (${cons}%). `;
  if(a.n>0){ const conv=Math.round((a.p+a.m)/a.n*100); ins+=`Aus ${a.n} neuen Menschen wurden ${a.t} Gespräche und ${a.p+a.m} Abschlüsse (${conv}% Quote). `; }
  if(a.p>0&&a.n>0) ins+='Mehr neue Menschen ⇒ mehr Partner. Genau hier liegt dein Hebel — bleib oben am Trichter.';
  else if(a.n < Math.round(a.total/7*S.settings.newTarget*0.6)) ins+='Die Trichterspitze ist zu schmal. Mehr neue Menschen pro Woche ist die eine Stellschraube, die alles andere zieht.';
  else ins+='Die Menge oben stimmt. Jetzt zählt Konstanz — Tag für Tag, nicht Sprint für Sprint.';
  html+=`<div class="insight">${ins}</div>`;
  v.innerHTML=html;
}
window.setRk=p=>{rkPeriod=p;renderRueckblick();};
window.toggleTracking=async function(){S.settings.tracking=!S.settings.tracking;await save('settings');if(S.settings.tracking)await logOpen();renderRueckblick();toast(S.settings.tracking?'Tracking aktiv':'Tracking aus');};

function speak(text){ if(!('speechSynthesis'in window)){toast('Vorlesen geht auf diesem Gerät nicht');return;} speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(text);u.lang='de-DE';u.rate=1.02; const v=speechSynthesis.getVoices().find(x=>x.lang&&x.lang.startsWith('de'));if(v)u.voice=v; speechSynthesis.speak(u); }
window.speakBriefing=function(){const moves=buildMoves().filter(m=>!doneSet().has(m.id)).slice(0,4);const idx=(new Date().getDate())%MENTOR_LINES.length;let t='Guten Morgen. '+MENTOR_LINES[idx]+' Deine wichtigsten Züge heute: ';moves.forEach((m,i)=>{t+=(i+1)+'. '+m.t+'. ';});if(!moves.length)t='Alles erledigt für heute. Stark gearbeitet.';speak(t);};

const MENTOR_SYS=`Du bist Oryx, der persönliche Stratege und Offline-Mentor von Lukas, einem leistungsorientierten Versicherungsmakler in Deutschland, der Senior Consultant werden will. Fakten: JC (417.400 BWS) ist quasi erreicht; danach beginnt frisch das SC-Ziel 1.254.900 BWS plus mind. 3 aktive Partner (Wunsch 6-10 dieses Jahr). Seine Engstelle ist NICHT das Überzeugen (Partner Marc gewonnen), sondern die Trichterspitze: nur 0-1 neue passende Menschen pro Woche, Ziel 3-5. Kanäle: Netzwerk-Events, Sport/privat, vor allem Kunden-Empfehlungen (am schnellsten). Recruiting ist der Masterhebel, weil Teamvolumen mit auf die 1,25 Mio zählt. Leitprinzip: Aktivitäten schlagen Ergebnisse. Denke wie ein Gründer, der von 0 auf 100 Millionen gebaut hat: in Systemen statt Stimmungen, Volumen schlägt Glück, Kundenobsession, First-Principles. Ton: respektvoll, auf Augenhöhe, leistungsorientiert, dominant-klar wie ein Operator mit Milliarden-Mindset, realistisch motivierend statt Hype. Du darfst widersprechen und zur Erholung raten. Antworte auf Deutsch, konkret, kurz (3-6 Sätze), mit klarem nächstem Schritt, ohne Listen. Erfinde keine Zitate echter Personen.`;

function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
function offlineCoach(txt){
  const t=txt.toLowerCase();
  if(/absage|abgesagt|abgelehnt|nein gesagt|abfuhr/.test(t)) return pick([
    "Eine Absage ist Rauschen, kein Signal. Du steuerst nicht den Einzelnen, du steuerst die Menge. Wen sprichst du heute zusätzlich an, damit eine Absage nichts mehr wiegt?",
    "Volumen schluckt jedes Nein. Ein voller Trichter macht jede einzelne Absage bedeutungslos. Trag heute zwei neue Namen oben ein.",
    "Profis verlieren mehr Deals als Amateure überhaupt starten. Das Nein gehört zum Spiel. Nächster Name — sofort."
  ]);
  if(/müde|erschöpft|kraftlos|keine lust|ausgebrannt|leer|platt/.test(t)) return pick([
    "Wenn du leer bist, ist Pause Disziplin, nicht Schwäche. Heute ein Zug statt zehn — aber der eine richtig. Was ist die kleinste sinnvolle Handlung, die du jetzt noch machst?",
    "Energie ist ein System, kein Zufall. Erhol dich heute hart, damit du morgen scharf zurückkommst. Lieber 80% über Monate als 120% über drei Tage.",
    "Müdigkeit ist kein Argument, Erschöpfung schon. Hör auf den Unterschied. Welche eine Handlung schließt heute sauber ab?"
  ]);
  if(/partner|recruit|mitarbeiter|team|aufbau/.test(t)) return pick([
    "Partner sind dein Masterhebel — sie zahlen auf beide Tore. Wichtiger als der nächste Abschluss ist der nächste Mensch. Wen bringst du diese Woche einen Schritt weiter?",
    "Du baust 1,25 Millionen nicht mit deinen Händen, sondern mit deinem Netzwerk. Jeder Partner multipliziert. Wer in deiner Pipeline steht kurz vor der Ansprache?",
    "Ein Gründer denkt in Systemen, die ohne ihn laufen. Partner sind genau das. Investier heute eine Stunde in den Aussichtsreichsten."
  ]);
  if(/umsatz|abschluss|geld|bws|kunde|mandant|provision/.test(t)) return pick([
    "Eigengeschäft hält dich im Spiel, Partner gewinnen das Spiel. Mach dein Mandantengeschäft sauber — und frag jeden Kunden nach einer Partner-Empfehlung.",
    "Kundenobsession zahlt sich aus: ein zufriedener Mandant ist die billigste Tür zu drei neuen. Wen hast du noch nicht nach einer Empfehlung gefragt?",
    "Geld folgt den Aktivitäten, nicht umgekehrt. Zähl heute deine Kontakte, nicht deine Kontostände."
  ]);
  if(/angst|unsicher|zweifel|versagen|schaff ich nicht|zu schwer/.test(t)) return pick([
    "Zweifel ist normal, Stillstand ist die Gefahr. Du musst nicht sicher sein, du musst nur anfangen. Was ist der allerkleinste nächste Schritt?",
    "Niemand baut etwas Großes ohne das Gefühl, es nicht zu schaffen. Der Unterschied ist: Macher handeln trotzdem. Eine Handlung jetzt schlägt jede Grübelei.",
    "First Principles: Was musst du wirklich tun, um SC zu erreichen? Mehr passende Menschen treffen. Alles andere ist Lärm. Geh raus."
  ]);
  if(/zeit|keine zeit|stress|überfordert|zu viel/.test(t)) return pick([
    "Du hast nicht zu wenig Zeit, du hast zu viele Prioritäten. Eine Sache zählt heute: die Trichterspitze. Den Rest darf liegen bleiben.",
    "Ein Operator schützt seine wichtigste Stunde wie sein Leben. Block 60 Minuten nur für neue Menschen. Heute.",
    "Mehr tun heißt nicht mehr schaffen. Frag dich: Welche eine Handlung bringt dich SC näher? Mach die zuerst."
  ]);
  if(/ziel|fokus|plan|strategie|wie weiter/.test(t)) return pick([
    "Dein Ziel ist klar: 1,25 Mio plus 3 Partner. Dein Engpass ist klar: zu wenig neue Menschen. Also ist dein Plan klar — mach den Trichter oben breiter. Wie viele triffst du diese Woche?",
    "Strategie ist Weglassen. Die eine Zahl, die SC entscheidet, ist neue passende Menschen pro Woche. Optimier die, ignorier den Rest.",
    "Ein gutes Ziel ohne tägliche Aktivität ist nur ein Wunsch. Was trägt heute konkret auf deine 3-5 neuen Menschen ein?"
  ]);
  if(/empfehlung|referral|fragen|netzwerk/.test(t)) return pick([
    "Empfehlungen sind dein schnellster Kanal — und der billigste. Jeder Mandant kennt jemanden, der mehr aus sich machen will. Frag heute genau einen.",
    "Die beste Frage deines Tages: „Wen kennst du, der mehr will?“ Stell sie einem Kunden, bevor du heute aufhörst.",
    "Dein Netzwerk ist ein Vermögen, das du nicht abrufst. Ein Event = mehrere neue Menschen. Wo kannst du dich diese Woche einladen lassen?"
  ]);
  return pick(MENTOR_LINES);
}
async function callMentor(){
  const msgs=S.chat.slice(-10).map(m=>({role:m.role,content:m.content}));
  if(inClaude){
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,system:MENTOR_SYS,messages:msgs})});
    const data=await res.json(); return (data.content||[]).map(x=>x.type==='text'?x.text:'').join('\n').trim();
  }
  if(S.apikey){
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':S.apikey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,system:MENTOR_SYS,messages:msgs})});
    const data=await res.json(); if(data.error) throw new Error(data.error.message||'api'); return (data.content||[]).map(x=>x.type==='text'?x.text:'').join('\n').trim();
  }
  throw new Error('offline');
}
function renderSetrow(){
  const r=$('#setrow');
  if(inClaude){ r.innerHTML=`<span>Live-Mentor <b>aktiv</b> (in Claude)</span>`; return; }
  if(S.apikey){ r.innerHTML=`<span>Live-Mentor <b>aktiv</b></span><button onclick="setKey()">Schlüssel ändern</button>`; }
  else { r.innerHTML=`<span>Oryx läuft als <b>Offline-Coach</b> — scharf & ohne Internet</span><button onclick="setKey()">Live-Mentor aktivieren</button>`; }
}
window.setKey=async function(){const k=prompt('Anthropic API-Schlüssel (beginnt mit sk-ant-…). Wird nur auf diesem Gerät gespeichert. Leer lassen = Offline-Coach.',S.apikey||'');if(k===null)return;S.apikey=k.trim();await save('apikey');renderSetrow();toast(S.apikey?'Live-Mentor aktiv':'Offline-Coach aktiv');};

function renderChat(){
  renderSetrow(); const c=$('#chat'); c.innerHTML='';
  if(!S.chat.length){ c.innerHTML=`<div class="msg coo">Ich bin Oryx, dein zweiter Kopf. Sag mir, was gerade ansteht oder dich blockiert — ein Kunde abgesagt, ein Tag verkorkst, eine Entscheidung. Ich sortier's mit dir und geb dir den nächsten Zug.</div>`; return; }
  S.chat.forEach(m=>{ const d=document.createElement('div');d.className='msg '+(m.role==='user'?'me':'coo');d.textContent=m.content;
    if(m.role==='assistant'){const b=document.createElement('button');b.className='spk';b.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M5 9v6h4l5 4V5L9 9zM17 8a5 5 0 0 1 0 8"/></svg>anhören`;b.onclick=()=>speak(m.content);d.appendChild(b);} c.appendChild(d); });
  c.scrollTop=c.scrollHeight;
}
async function sendMentor(){
  const i=$('#mInput');const text=i.value.trim();if(!text)return;i.value='';i.style.height='auto';
  S.chat.push({role:'user',content:text});renderChat();await save('chat');
  const c=$('#chat');const tp=document.createElement('div');tp.className='typing';tp.textContent='Oryx denkt nach…';c.appendChild(tp);c.scrollTop=c.scrollHeight;
  let reply;
  try{ reply=await callMentor(); if(!reply)throw new Error('empty'); }
  catch(e){ reply=offlineCoach(text)+(inClaude||S.apikey?'':'\n\n(Offline-Coach. Für freie Gespräche oben „Live-Mentor aktivieren“.)'); }
  S.chat.push({role:'assistant',content:reply});tp.remove();renderChat();await save('chat');
}

function switchView(v){document.querySelectorAll('.view').forEach(s=>s.classList.remove('active'));$('#v-'+v).classList.add('active');document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('on',b.dataset.v===v));if(v==='heute')renderHeute();if(v==='pipeline')renderPipeline();if(v==='netzwerk')renderNetzwerk();if(v==='rueckblick')renderRueckblick();if(v==='mentor')renderChat();window.scrollTo(0,0);}
document.querySelectorAll('nav button').forEach(b=>b.onclick=()=>switchView(b.dataset.v));
$('#mSend').onclick=sendMentor;
$('#mInput').addEventListener('input',e=>{e.target.style.height='auto';e.target.style.height=Math.min(120,e.target.scrollHeight)+'px';});
$('#mInput').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMentor();}});
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
if(SR){const mic=$('#mMic');mic.style.display='flex';let rec=null,listening=false;mic.onclick=()=>{if(listening){rec&&rec.stop();return;}rec=new SR();rec.lang='de-DE';rec.interimResults=false;rec.onstart=()=>{listening=true;mic.classList.add('rec');};rec.onend=()=>{listening=false;mic.classList.remove('rec');};rec.onresult=e=>{const txt=e.results[0][0].transcript;const inp=$('#mInput');inp.value=(inp.value?inp.value+' ':'')+txt;inp.dispatchEvent(new Event('input'));};rec.start();};}

async function loadAll(){
  for(const k of ['kandidaten','kunden','kontakte','events','week','doneByDate','log','settings','chat','apikey']){const val=await store.get('coo:'+k);if(val!==null)S[k]=val;}
  // Settings: neue Felder nachziehen
  S.settings=Object.assign({partnerMin:3,partnerStretch:10,newTarget:4,outTarget:4,tracking:true},S.settings||{});
  await save('settings');
  // Seed beim allerersten Start
  if(!await store.get('coo:seeded')){
    S.kandidaten=[{id:uid(),name:'Marc',stage:'Abschluss',result:'Partner',channel:'—',next:'',touch:new Date().toISOString()},{id:uid(),name:'Rudi',stage:'CO-Gespräch',result:'',channel:'—',next:'Reaktivieren — Treffen vorschlagen',touch:new Date(Date.now()-20*86400000).toISOString()}];
    await save('kandidaten');await store.set('coo:seeded',true);
  }
  // Migration v2: alte 4-Stufen -> neue 5-Stufen + result
  if(!await store.get('coo:migrated_v2')){
    const map={'Im Gespräch':'CO-Gespräch','Heiß':'Geputscht'};
    S.kandidaten.forEach(k=>{
      if(k.stage==='Partner'){k.stage='Abschluss';k.result='Partner';}
      else if(map[k.stage]){k.stage=map[k.stage];}
      if(!('result'in k))k.result='';
    });
    S.kunden.forEach(c=>{ if(!('askedRef'in c))c.askedRef=null; });
    await save('kandidaten');await save('kunden');await store.set('coo:migrated_v2',true);
  }
  const mon=monday(new Date()); if(!S.week||S.week.start!==mon){S.week={start:mon,newPeople:0,talks:0,out:0};await save('week');}
  else if(S.week.out===undefined){S.week.out=0;await save('week');}
  await logOpen();
  $('#headDate').textContent=fmtDate(new Date()); renderHeute();
}
if('speechSynthesis'in window){speechSynthesis.onvoiceschanged=()=>{};speechSynthesis.getVoices();}
loadAll();
